<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }

        input {
            padding: 8px;
            margin: 10px;
            width: 250px;
        }

        .error {
            color: red;
            font-size: 14px;
        }

        .success {
            color: green;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h2>Registration Form</h2>

    <!-- Name -->
    <div>
        <input type="text" id="name" placeholder="Enter Name" onchange="validateName()">
        <div id="nameMsg" class="error"></div>
    </div>

    <!-- Email -->
    <div>
        <input type="text" id="email" placeholder="Enter Email" onchange="validateEmail()">
        <div id="emailMsg" class="error"></div>
    </div>

    <!-- Age -->
    <div>
        <input type="number" id="age" placeholder="Enter Age" onchange="validateAge()">
        <div id="ageMsg" class="error"></div>
    </div>

    <button onclick="registerUser()">Register</button>

    <div id="finalMsg"></div>

    <script>
        function validateName() {
            let name = document.getElementById("name").value;
            if (name.trim() === "") {
                document.getElementById("nameMsg").innerHTML = "Name cannot be empty";
                return false;
            } else {
                document.getElementById("nameMsg").innerHTML = "";
                return true;
            }
        }

        function validateEmail() {
            let email = document.getElementById("email").value;
            if (email.indexOf("@") === -1) {
                document.getElementById("emailMsg").innerHTML = "Email must contain @";
                return false;
            } else {
                document.getElementById("emailMsg").innerHTML = "";
                return true;
            }
        }

        function validateAge() {
            let age = document.getElementById("age").value;
            if (age <= 18 || age === "") {
                document.getElementById("ageMsg").innerHTML = "Age must be greater than 18";
                return false;
            } else {
                document.getElementById("ageMsg").innerHTML = "";
                return true;
            }
        }

        function registerUser() {
            let isNameValid = validateName();
            let isEmailValid = validateEmail();
            let isAgeValid = validateAge();

            if (isNameValid && isEmailValid && isAgeValid) {

                // Store in sessionStorage
                sessionStorage.setItem("userName", document.getElementById("name").value);
                sessionStorage.setItem("userEmail", document.getElementById("email").value);
                sessionStorage.setItem("userAge", document.getElementById("age").value);

                document.getElementById("finalMsg").innerHTML =
                    "<p class='success'>Registration Successful! Data stored in sessionStorage.</p>";
            } else {
                document.getElementById("finalMsg").innerHTML =
                    "<p class='error'>Please fix the errors above.</p>";
            }
        }
    </script>

</body>
</html>
