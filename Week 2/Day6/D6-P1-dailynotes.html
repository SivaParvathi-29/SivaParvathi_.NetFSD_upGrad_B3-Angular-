<!DOCTYPE html>
<html>
<head>
    <title>Daily Notes App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
            background-color: #f4f4f4;
        }

        textarea {
            width: 300px;
            height: 150px;
            padding: 10px;
            font-size: 16px;
        }

        button {
            margin: 10px;
            padding: 8px 15px;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>📝 Daily Notes</h2>

    <!-- Textarea -->
    <textarea id="noteArea" placeholder="Write your daily notes here..."></textarea>
    <br>

    <!-- Buttons -->
    <button onclick="saveNote()">Save</button>
    <button onclick="clearNote()">Clear</button>

    <script>
        // Load saved note when page loads
        window.onload = function() {
            let savedNote = localStorage.getItem("dailyNote");
            if (savedNote) {
                document.getElementById("noteArea").value = savedNote;
            }
        };

        // Save note to localStorage
        function saveNote() {
            let noteText = document.getElementById("noteArea").value;
            localStorage.setItem("dailyNote", noteText);
            alert("Note Saved Successfully!");
        }

        // Clear note
        function clearNote() {
            document.getElementById("noteArea").value = "";
            localStorage.removeItem("dailyNote");
            alert("Note Cleared!");
        }
    </script>

</body>
</html>
