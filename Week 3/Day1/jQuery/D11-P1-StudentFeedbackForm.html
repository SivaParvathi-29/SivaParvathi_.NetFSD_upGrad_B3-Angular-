<!DOCTYPE html>
<html>
<head>
    <title>Student Feedback Form</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            background-color: lightgray;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }

        button {
            padding: 10px;
            width: 100%;
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        .error {
            color: red;
            font-size: 14px;
        }

        .success {
            color: green;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Student Feedback Form</h2>

    <form id="feedbackForm">
        <input type="text" id="name" placeholder="Enter your Name">
        <input type="email" id="email" placeholder="Enter your Email">

        <select id="rating">
            <option value="">Select Course Rating</option>
            <option>Excellent</option>
            <option>Good</option>
            <option>Average</option>
            <option>Poor</option>
        </select>

        <textarea id="comments" placeholder="Enter your Comments"></textarea>

        <button type="submit">Submit</button>

        <div id="message"></div>
    </form>
</div>

<script>
$(document).ready(function(){

    $("#feedbackForm").submit(function(event){
        event.preventDefault(); 

        var name = $("#name").val().trim();
        var email = $("#email").val().trim();

        $("#message").html("");

        if(name === "" || email === ""){
            $("#message").html("<p class='error'>Please enter your Name and Email.</p>");
        } 
        else {
            $("#message").html("<p class='success'>Thank you! Your feedback is submitted successfully.</p>");

            $("#feedbackForm")[0].reset(); 
        }
    });

});
</script>

</body>
</html>
