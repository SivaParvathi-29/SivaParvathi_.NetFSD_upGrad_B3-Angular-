<!DOCTYPE html>
<html>
<head>
    <title>Online Store Discount System</title>
</head>
<body>

    <h2>Online Store Discount Calculation</h2>
    <hr>

    <p id="output"></p>

    <script>
        
        let amount = 4000;

       
        let discount = 0;
        let finalAmount = 0;

        
        if (amount >= 5000) {
            discount = amount * 20 / 100;   
        }
        else if (amount >= 3000) {
            discount = amount * 10 / 100;   
        }
        else {
            discount = 0;   
        }

        
        finalAmount = amount - discount;

        
        document.getElementById("output").innerHTML =
            "Purchase Amount: ₹" + amount + "<br>" +
            "Discount Amount: ₹" + discount + "<br>" +
            "Final Payable Amount: ₹" + finalAmount;

        
        console.log("Purchase Amount:", amount);
        console.log("Discount Amount:", discount);
        console.log("Final Payable Amount:", finalAmount);
    </script>

</body>
</html>
