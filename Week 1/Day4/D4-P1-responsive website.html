<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <!-- Viewport Meta Tag -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Responsive Webpage</title>

    <style>
        /* Default Desktop Styles */
        body {
            font-family: Arial, sans-serif;
            background-color: lightblue;
            margin: 0;
        }

        h1 {
            text-align: center;
            font-size: 32px;
        }

        /* Navigation Bar */
        nav {
            background-color: navy;
            padding: 10px;
        }

        nav ul {
            list-style: none;
            display: flex;  /* Horizontal on desktop */
            justify-content: center;
            padding: 0;
        }

        nav ul li {
            margin: 0 15px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 18px;
        }

        .content {
            padding: 20px;
            text-align: center;
            font-size: 20px;
        }

        /* ========================= */
        /* Media Query for Mobile */
        /* ========================= */
        @media screen and (max-width: 600px) {

            body {
                background-color: lightgreen; /* Change background on mobile */
            }

            h1 {
                font-size: 22px; /* Smaller font */
            }

            .content {
                font-size: 16px; /* Adjust text size */
            }

            nav ul {
                flex-direction: column;  /* Vertical navigation */
                align-items: center;
            }

            nav ul li {
                margin: 10px 0;
            }
        }

    </style>
</head>

<body>

    <h1>Responsive Webpage</h1>

    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <div class="content">
        <p>This page changes layout and style based on screen size.</p>
        <p>Resize the browser window to see the effect.</p>
    </div>

</body>
</html>
